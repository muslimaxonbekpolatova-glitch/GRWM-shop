<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GRWM — Kirish</title>
  
  <!-- PWA ulash qismi -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  
  <!-- EMAILJS KUTUBXONASI -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
     emailjs.init("PX4uGfcrd7goNCqlQ"); 
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .auth-card { width: 100%; max-width: 320px; text-align: center; }
    .logo { font-size: 32px; font-weight: 800; letter-spacing: 5px; margin-bottom: 40px; }
    .step { display: none; flex-direction: column; gap: 14px; }
    .step.active { display: flex; }
    .min-input { width: 100%; background: #111; border: 1px solid rgba(255,255,255,0.08); padding: 16px; color: #fff; font-size: 14px; border-radius: 8px; outline: none; transition: border-color 0.2s; }
    .min-input:focus { border-color: rgba(255,255,255,0.3); }
    .min-btn { width: 100%; background: #fff; color: #000; border: none; padding: 16px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
    .min-btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
    .info-text { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5; margin-bottom: 5px; }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="logo">GRWM</div>

    <!-- 1-QADAM: EMAIL KIRITISH -->
    <div class="step active" id="s1">
      <input type="email" class="min-input" placeholder="Email manzilingizni kiriting" id="loginTarget" autocomplete="off">
      <button class="min-btn" id="sendBtn" onclick="sendVerificationReal()">Kod yuborish</button>
    </div>

    <!-- 2-QADAM: KODNI TASDIQLASH -->
    <div class="step" id="s2">
      <p class="info-text" id="verificationMsg"></p>
      <input type="tel" class="min-input" placeholder="8 xonali kod" id="smsCode" style="text-align:center; letter-spacing: 3px;" maxlength="8" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
      <button class="min-btn" onclick="checkVerificationReal()">Tasdiqlash</button>
    </div>

    <!-- 3-QADAM: ISM FAMILIYA -->
    <div class="step" id="s3">
      <input type="text" class="min-input" placeholder="Ism" id="nameInp" autocomplete="off">
      <input type="text" class="min-input" placeholder="Familiya" id="surInp" autocomplete="off">
      <button class="min-btn" onclick="finishAuth()">Profilni yaratish</button>
    </div>
  </div>

  <script type="module">
    // PWA Service Worker-ni ro'yxatdan o'tkazish
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('SW ulandi!');
        }).catch(err => console.log('SW xatosi:', err));
      });
    }

    let generatedCode = ""; 
    let savedEmail = "";
    
    function sendVerificationReal() {
      savedEmail = document.getElementById('loginTarget').value.trim();
      
      if(savedEmail === "" || !savedEmail.includes("@")) { 
        alert("Iltimos, to'g'ri email manzil kiriting!"); 
        return; 
      }

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.innerText = "Yuborilmoqda...";
      sendBtn.disabled = true;

      // 8 xonali tasodifiy kod yaratish
      generatedCode = Math.floor(10000000 + Math.random() * 90000000).toString();

      const templateParams = {
        to_email: savedEmail,
        verification_code: generatedCode
      };

      emailjs.send('service_hzhukxc', 'template_kihvl3h', templateParams)
        .then(function(response) {
           alert("Kod emailingizga muvaffaqiyatli yuborildi!");
           document.getElementById('verificationMsg').innerText = `${savedEmail} manziliga yuborilgan kodni kiriting.`;
           document.getElementById('s1').classList.remove('active');
           document.getElementById('s2').classList.add('active');
        }, function(error) {
           alert("Xatolik yuz berdi: " + error.text);
           sendBtn.innerText = "Kod yuborish";
           sendBtn.disabled = false;
        });
    }

    function checkVerificationReal() {
      const userCode = document.getElementById('smsCode').value.trim();
      if(userCode === generatedCode) {
        document.getElementById('s2').classList.remove('active');
        document.getElementById('s3').classList.add('active');
      } else { 
        alert("Xato kod! Qayta tekshirib kiriting."); 
      }
    }

    function finishAuth() {
      const name = document.getElementById('nameInp').value.trim();
      const surname = document.getElementById('surInp').value.trim();

      if(name !== "" && surname !== "") {
        // Mahalliy xotiraga saqlab qo'yamiz (tizimga kirdi deb hisoblash uchun)
        localStorage.setItem('grwm_user_logged', 'true');
        localStorage.setItem('grwm_user_name', name + ' ' + surname);
        
        // Asosiy sahifaga yo'naltirish
        location.href = 'home.html';
      } else { 
        alert("Ism va familiyangizni kiriting!"); 
      }
    }

    // Funksiyalarni global HTML elementlaridan (onclick) chaqirish uchun oyna (window) obyektiga bog'laymiz
    window.sendVerificationReal = sendVerificationReal;
    window.checkVerificationReal = checkVerificationReal;
    window.finishAuth = finishAuth;
  </script>
</body>
</html>
