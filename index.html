<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GRWM — Kirish</title>
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
     emailjs.init("PX4uGfcrd7goNCqlQ"); 
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .auth-card { width: 100%; max-width: 320px; text-align: center; }
    .logo { font-size: 32px; font-weight: 800; letter-spacing: 5px; margin-bottom: 40px; }
    .step { display: none; flex-direction: column; gap: 14px; }
    .step.active { display: flex; }
    .min-input { width: 100%; background: #111; border: 1px solid rgba(255,255,255,0.08); padding: 16px; color: #fff; font-size: 14px; border-radius: 8px; outline: none; }
    .min-btn { width: 100%; background: #fff; color: #000; border: none; padding: 16px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    .min-btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
    .info-text { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5; margin-bottom: 5px; }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="logo">GRWM</div>

    <div class="step active" id="s1">
      <input type="email" class="min-input" placeholder="Email manzilingizni kiriting" id="loginTarget">
      <button class="min-btn" id="sendBtn" onclick="sendVerificationReal()">Kod yuborish</button>
    </div>

    <div class="step" id="s2">
      <p class="info-text" id="verificationMsg"></p>
      <input type="tel" class="min-input" placeholder="8 xonali kod" id="smsCode" style="text-align:center; letter-spacing: 3px;" maxlength="8" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
      <button class="min-btn" onclick="checkVerificationReal()">Tasdiqlash</button>
    </div>

    <div class="step" id="s3">
      <input type="text" class="min-input" placeholder="Ism" id="nameInp">
      <input type="text" class="min-input" placeholder="Familiya" id="surInp">
      <button class="min-btn" onclick="finishAuth()">Profilni yaratish</button>
    </div>
  </div>

  <script>
    let generatedCode = ""; 
    let savedEmail = "";
    
    function sendVerificationReal() {
      savedEmail = document.getElementById('loginTarget').value.trim();
      
      if(savedEmail === "" || !savedEmail.includes("@")) { 
        alert("Iltimos, to'g'ri email manzil kiriting!"); 
        return; 
      }

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.innerText = "Yuborilmoqda...";
      sendBtn.disabled = true;

      // Har doim aniq 8 xonali kod generatsiya qilish
      generatedCode = Math.floor(10000000 + Math.random() * 90000000).toString();

      // EmailJS uchun to'g'ri sozlangan parametrlar
      const templateParams = {
        to_email: savedEmail,
        verification_code: generatedCode
      };

      emailjs.send('service_hzhukxc', 'template_kihvl3h', templateParams)
        .then(function(response) {
           alert("Kod yuborildi! Pochtangizni va SPAM papkasini tekshiring.");
           document.getElementById('verificationMsg').innerText = `${savedEmail} manziliga yuborilgan kodni kiriting.`;
           document.getElementById('s1').classList.remove('active');
           document.getElementById('s2').classList.add('active');
        }, function(error) {
           alert("EmailJS xatolik berdi. Sababi: " + error.text);
           sendBtn.innerText = "Kod yuborish";
           sendBtn.disabled = false;
        });
    }

    function checkVerificationReal() {
      const userCode = document.getElementById('smsCode').value.trim();
      if(userCode === generatedCode) {
        document.getElementById('s2').classList.remove('active');
        document.getElementById('s3').classList.add('active');
      } else { 
        alert("Xato kod! Qayta urinib ko'ring."); 
      }
    }

    function finishAuth() {
      if(document.getElementById('nameInp').value.trim() !== "" && document.getElementById('surInp').value.trim() !== "") {
        location.href = 'home.html';
      } else { alert("Ism va familiyangizni kiriting!"); }
    }
  </script>
</body>
</html>
