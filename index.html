<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRWM — Welcome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000000;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
      overflow: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 320px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .brand-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-field {
      width: 100%;
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 16px;
      color: #ffffff;
      font-size: 14px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .submit-btn {
      width: 100%;
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 16px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .submit-btn:active {
      background: rgba(255, 255, 255, 0.8);
    }

    .footer-note {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <!-- BREND NOMI -->
    <h1 class="brand-title">GRWM</h1>

    <!-- LOGIN FORMASI -->
    <div class="form-group">
      <input type="text" class="input-field" placeholder="Telefon raqam yoki Email" id="userInput">
      <input type="password" class="input-field" placeholder="Parol" id="passInput">
      
      <!-- BOSILGANDA HOME.HTML GA O'TAYDIGAN TUGMA -->
      <button class="submit-btn" onclick="handleLogin()">Kirish</button>
    </div>

    <div class="footer-note">Premium Minimalist Store v1.0</div>
  </div>

  <script>
    function handleLogin() {
      const user = document.getElementById('userInput').value;
      const pass = document.getElementById('passInput').value;

      // Oddiy tekshiruv (bo'sh bo'lmasa bas, silliq o'tib ketadi)
      if(user.trim() !== "" && pass.trim() !== "") {
        // Muvaffaqiyatli bo'lsa Bosh sahifaga yo'naltirish
        location.href = 'home.html';
      } else {
        alert("Iltimos, maydonlarni to'ldiring! (Xohlagan login va parolni yozishingiz mumkin)");
      }
    }
  </script>

</body>
</html>
