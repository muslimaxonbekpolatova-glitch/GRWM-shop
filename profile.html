<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Instagram Profile Fixed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000000; color: #ffffff; padding-bottom: 65px; overflow-x: hidden; }
    .instagram-navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; position: sticky; top: 0; background: #000000; z-index: 100; border-bottom: 1px solid #121212; }
    .nav-username { font-size: 22px; font-weight: 700; }
    .profile-info-container { padding: 10px 16px 4px 16px; }
    .insta-avatar { width: 86px; height: 86px; border-radius: 50%; object-fit: cover; border: 2px solid #262626; }
    .insta-btn { flex: 1; background: #1c1c1e; color: #ffffff; border: none; padding: 8px 10px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .instagram-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .grid-post { position: relative; width: 100%; padding-top: 100%; background: #121212; cursor: pointer; }
    .grid-post img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .reels-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #000; z-index: 5000; display: none; flex-direction: column; }
    .modal-close { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 30px; z-index: 5001; cursor: pointer; }
    .reels-img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

  <div class="instagram-navbar">
    <div class="nav-username" id="navUsername">monochrome.uz</div>
  </div>

  <div class="profile-info-container">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <img class="insta-avatar" id="profileAvatarImg" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200">
      <div style="text-align: center;"><b>3</b><br>Posts</div>
    </div>
    <div style="margin-top:10px;">
      <b id="profileNameTxt">monochrome.uz</b>
      <div id="profileDescTxt">Minimalist kiyimlar brendi.</div>
    </div>
    <div style="display: flex; gap: 8px; margin-top: 15px;">
      <button class="insta-btn" onclick="openEditModal()">Edit Profile</button>
    </div>
  </div>

  <div class="instagram-grid" id="reelsGrid"></div>

  <div class="reels-modal" id="reelsModal">
    <div class="modal-close" onclick="closeReels()">✕</div>
    <img class="reels-img" id="modalImg" src="">
  </div>

  <div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9000; padding:20px;">
    <div style="background:#1c1c1e; padding:20px; border-radius:12px; margin-top:50px;">
      <input type="text" id="editNameInput" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333;">
      <button class="insta-btn" onclick="saveProfileChanges()">Save</button>
      <button class="insta-btn" style="background:#444;" onclick="document.getElementById('editModal').style.display='none'">Cancel</button>
    </div>
  </div>

  <script>
    const data = [
      { url: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600' },
      { url: 'https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=600' },
      { url: 'https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=600' }
    ];

    function renderGrid() {
      const g = document.getElementById('reelsGrid');
      g.innerHTML = data.map((post, i) => `
        <div class="grid-post" onclick="openReels(${i})"><img src="${post.url}"></div>
      `).join('');
    }

    function openReels(i) {
      document.getElementById('modalImg').src = data[i].url;
      document.getElementById('reelsModal').style.display = 'flex';
    }

    function closeReels() { document.getElementById('reelsModal').style.display = 'none'; }

    function openEditModal() { 
      document.getElementById('editNameInput').value = document.getElementById('profileNameTxt').innerText;
      document.getElementById('editModal').style.display = 'block'; 
    }

    function saveProfileChanges() {
      const name = document.getElementById('editNameInput').value;
      if(name) {
        document.getElementById('profileNameTxt').innerText = name;
        document.getElementById('navUsername').innerText = name;
      }
      document.getElementById('editModal').style.display = 'none';
    }

    renderGrid();
  </script>
</body>
</html>
