<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRWM — Profil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
    body { background: #000; color: #fff; font-family: sans-serif; padding-bottom: 70px; }
    .page { display: none; }
    #profilePage { display: block; }
    .profile-header { padding: 20px; }
    .top-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
    .stats { display: flex; gap: 20px; flex-grow: 1; justify-content: center; }
    .stat { text-align: center; }
    .val { font-weight: bold; display: block; }
    .lbl { font-size: 11px; color: #888; text-transform: uppercase; }
    .bio { margin-bottom: 15px; font-size: 14px; }
    .edit-btn { width: 100%; padding: 8px; background: #222; border: none; color: #fff; border-radius: 5px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .item { aspect-ratio: 1; background: #111; cursor: pointer; }
    .item img { width: 100%; height: 100%; object-fit: cover; }
    .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; background: #000; border-top: 1px solid #333; z-index: 1000; cursor: pointer; font-size: 24px; }
    .viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; overflow-y: scroll; scroll-snap-type: y mandatory; }
    .slide { width: 100%; height: 100vh; scroll-snap-align: start; position: relative; display: flex; flex-direction: column; }
    .slide img { flex: 1; width: 100%; object-fit: cover; }
    .viewer-actions { height: 15%; display: flex; padding: 20px; gap: 25px; font-size: 28px; background: #000; align-items: center; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; padding: 20px; }
    .modal-content { max-width: 400px; margin: 50px auto; background: #111; padding: 20px; border-radius: 10px; }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: none; color: #fff; border-radius: 5px; }
  </style>
</head>
<body>

<div id="homePage" class="page"><div style="padding:20px;"><h2>Uy</h2></div></div>

<div id="profilePage" class="page">
  <div class="profile-header">
    <div class="top-info">
      <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar" id="ava">
      <div class="stats">
        <div class="stat"><span class="val">3</span><span class="lbl">Post</span></div>
        <div class="stat"><span class="val">1.2K</span><span class="lbl">Obunachi</span></div>
        <div class="stat"><span class="val">348</span><span class="lbl">Obuna</span></div>
      </div>
    </div>
    <div class="bio" id="bioBox"><b>Muslimaxon Bekpolatova</b><br>Minimalist lifestyle creator ✨</div>
    <button class="edit-btn" onclick="document.getElementById('editM').style.display='block'">Tahrirlash</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div id="reelsPage" class="page viewer">
  <div id="slides"></div>
</div>

<div class="nav">
  <span onclick="showPage('homePage')">🏠</span>
  <span onclick="showPage('reelsPage')">🎬</span>
  <span onclick="document.getElementById('postM').style.display='block'">➕</span>
  <span onclick="document.getElementById('orderM').style.display='block'">💬</span>
  <span onclick="showPage('profilePage')">👤</span>
</div>

<div class="modal" id="orderM">
  <div class="modal-content">
    <h3>Buyurtmalar</h3>
    <textarea placeholder="Buyurtmani qabul qilish..."></textarea>
    <button onclick="document.getElementById('orderM').style.display='none'" style="width:100%; padding:10px; background:#0095f6;">Yuborish</button>
  </div>
</div>

<div class="modal" id="postM">
  <div class="modal-content">
    <h3>Post yuklash</h3>
    <input type="file" accept="image/*,video/*">
    <button onclick="document.getElementById('postM').style.display='none'" style="width:100%; padding:10px; background:#0095f6;">Joylash</button>
  </div>
</div>

<div class="modal" id="editM">
  <div class="modal-content">
    <input type="text" id="inName" placeholder="Ism Familiya">
    <textarea id="inBio" placeholder="Bio"></textarea>
    <button onclick="save()" style="width:100%; padding:10px; background:#0095f6;">Saqlash</button>
  </div>
</div>

<script>
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(id).style.display = 'block';
  }
  const g = document.getElementById('grid');
  const s = document.getElementById('slides');
  [1,2,3].forEach((i) => {
    g.innerHTML += `<div class="item" onclick="showPage('reelsPage')"><img src="https://picsum.photos/500/900?${i}"></div>`;
    s.innerHTML += `<div class="slide"><img src="https://picsum.photos/500/900?${i}"><div class="viewer-actions"><span onclick="this.style.color='red'">♥</span></div></div>`;
  });
  function save() {
    const n = document.getElementById('inName').value;
    const b = document.getElementById('inBio').value;
    if(n || b) document.getElementById('bioBox').innerHTML = `<b>${n}</b><br>${b}`;
    document.getElementById('editM').style.display='none';
  }
</script>

</body>
</html>
