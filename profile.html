<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRWM — Profil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; padding-bottom: 80px; }
    
    .profile-container { padding: 30px 20px; display: flex; flex-direction: column; gap: 24px; }
    .profile-header { display: flex; align-items: center; gap: 25px; }
    .profile-pic { width: 76px; height: 76px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid rgba(255,255,255,0.08); }
    
    .stats-row { display: flex; flex-grow: 1; justify-content: space-around; text-align: center; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-num { font-size: 16px; font-weight: 700; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    .bio-section { display: flex; flex-direction: column; gap: 4px; }
    .edit-profile-btn { width: 100%; background: #111; border: 1px solid rgba(255,255,255,0.08); padding: 12px; color: #fff; font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer; text-align: center; }

    .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; margin-top: 10px; }
    .grid-photo { aspect-ratio: 1; background: #111; display: flex; align-items: center; justify-content: center; font-size: 11px; color: rgba(255,255,255,0.3); }

    .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; align-items: center; z-index: 3000; }
    .nav-btn { background: none; border: none; color: rgba(255, 255, 255, 0.4); font-size: 24px; cursor: pointer; }
    .nav-btn.active { color: #ffffff; }
  </style>
</head>
<body>

  <div class="profile-container">
    <div class="profile-header">
      <div class="profile-pic">👤</div>
      <div class="stats-row">
        <div class="stat-item"><span class="stat-num">10</span><span class="stat-label">Videolar</span></div>
        <div class="stat-item"><span class="stat-num">4.8k</span><span class="stat-label">Obunachilar</span></div>
        <div class="stat-item"><span class="stat-num">184</span><span class="stat-label">Obunalar</span></div>
      </div>
    </div>

    <div class="bio-section">
      <div style="font-size:14px; font-weight:700;">GRWM User</div>
      <div style="font-size:13px; color:gray;">Premium Minimalist Wardrobe Aesthetics. ✨</div>
    </div>

    <button class="edit-profile-btn">Profilni tahrirlash</button>

    <div class="posts-grid">
      <div class="grid-photo">🎬 1</div>
      <div class="grid-photo">🎬 2</div>
      <div class="grid-photo">🎬 3</div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="nav-btn" onclick="location.href='home.html'">🏠</button>
    <button class="nav-btn" onclick="location.href='reels.html'">🎬</button>
    <button class="nav-btn" onclick="location.href='upload.html'">➕</button>
    <button class="nav-btn" onclick="location.href='chat.html'">💬</button>
    <button class="nav-btn active" onclick="location.href='profile.html'">👤</button>
  </div>

</body>
</html>
