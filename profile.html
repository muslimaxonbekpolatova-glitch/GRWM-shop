<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRWM — Profile Premium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000000;
      color: #ffffff;
      padding-bottom: 80px;
      overflow-x: hidden;
    }

    /* PROFILE HEADER */
    .profile-header {
      padding: 24px 20px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .top-meta {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .profile-avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stats-flex {
      display: flex;
      gap: 20px;
      flex: 1;
    }

    .stat-box {
      text-align: left;
    }

    .stat-num {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* EDIT PROFILE BUTTON */
    .edit-profile-btn {
      width: 100%;
      background: #1c1c1e;
      color: #ffffff;
      border: none;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    .edit-profile-btn:active {
      background: #2c2c2e;
    }

    /* BIO SECTION */
    .profile-bio {
      padding: 0 4px;
    }

    .profile-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }

    .profile-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.4;
    }

    /* PREMIUM MINIMAL ANALYTICS */
    .analytics-section {
      padding: 16px 20px;
      background: #0b0b0b;
      margin: 12px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .analytics-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 12px;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* INSTAGRAM STYLE GRID (3 COLUMNS) */
    .reels-grid-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.4);
      padding: 20px 24px 10px 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 12px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 0 2px;
    }

    .grid-item {
      position: relative;
      width: 100%;
      padding-top: 133%; /* 3:4 High-end aspect ratio */
      background: #111111;
      cursor: pointer;
    }

    .grid-item img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.2s;
    }
    .grid-item:active img { opacity: 0.7; }

    .video-views {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 9px;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 6px;
      border-radius: 3px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      letter-spacing: 0.3px;
    }

    /* FIXED BOTTOM NAVIGATION BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65px;
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
    }
    .nav-btn { background: none; border: none; color: rgba(255, 255, 255, 0.4); font-size: 24px; cursor: pointer; }
    .nav-btn.active { color: #ffffff; }

    /* INSTAGRAM REELS MODAL VIEW */
    .reels-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      z-index: 2000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      left: 20px;
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      z-index: 2100;
      cursor: pointer;
    }

    .reels-viewer {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      background: #000;
    }

    .reels-main-img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    /* OVERLAY ACTIONS (LIKE, COMMENT, SHARE) */
    .reels-actions {
      position: absolute;
      right: 16px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      z-index: 2050;
    }

    .action-btn {
      background: none;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }

    .action-btn span {
      font-size: 11px;
      margin-top: 4px;
      color: rgba(255,255,255,0.8);
    }

    /* COMMENT INPUT FIELD */
    .comment-box {
      position: absolute;
      bottom: 85px;
      left: 0;
      width: 100%;
      padding: 0 16px;
      display: none;
      z-index: 2060;
    }

    .comment-input-wrapper {
      display: flex;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 10px 16px;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .comment-input-wrapper input {
      flex: 1;
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      outline: none;
    }

    .comment-input-wrapper button {
      background: none;
      border: none;
      color: #00fff0;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    /* EDIT PROFILE MODAL */
    .edit-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 3000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .edit-modal-content {
      background: #121212;
      border: 1px solid rgba(255,255,255,0.1);
      width: 100%;
      max-width: 400px;
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .edit-modal-title {
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }

    .edit-input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .edit-input-group label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    .edit-input-group input, .edit-input-group textarea {
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px;
      color: #ffffff;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }

    .edit-input-group textarea {
      resize: none;
      height: 60px;
    }

    .edit-modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .edit-action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .edit-save {
      background: #ffffff;
      color: #000000;
    }

    .edit-cancel {
      background: #2c2c2e;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="profile-header">
    <div class="top-meta">
      <img class="profile-avatar" id="profileAvatarImg" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" alt="Avatar">
      <div class="stats-flex">
        <div class="stat-box">
          <div class="stat-num" id="videoCount">3</div>

        <div class="stat-box">

    <div class="profile-bio">

  </div>

  <div class="reels-grid-title">Yuklangan videolar</div>

    <div class="grid-item" onclick="openReelsModal('https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=600', '17.9K')">

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://wdoytdiugkhlniysdfri.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_qZHLHaUhp3dqBrj58ZtZWw_61gzjskd';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadUserReels() {
      try {
        const { data, error } = await supabaseClient
          .from('reels_posts')
          .select('*');
        if (error) throw error;

        if (data && data.length > 0) {
          const gridContainer = document.getElementById('reelsGrid');
          gridContainer.innerHTML = ''; 

          data.forEach(post => {
            const imgUrl = post.thumbnail_url || 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=300';
            const views = post.views || '0';

            const gridItem = `
              <div class="grid-item" onclick="openReelsModal('${imgUrl}', '${views}')">
                <img src="${imgUrl}" alt="Reels">
                <div class="video-views">▶ ${views}</div>
              </div>
            `;
            gridContainer.insertAdjacentHTML('beforeend', gridItem);
          });
          document.getElementById('videoCount').innerText = data.length;
        }
      } catch(e) {
        console.log("Offline yoki fallback rejimida muvaffaqiyatli yuklandi.");
      }
    }
    document.addEventListener('DOMContentLoaded', loadUserReels);

    /* MODAL TIZIMI LOGIKASI */
    let isLiked = false;

    function openReelsModal(imgSrc, views) {
      document.getElementById('modalImg').src = imgSrc;
      document.getElementById('reelsModal').style.display = 'flex';
      document.body.style.overflow = 'hidden'; 
      
      isLiked = false;
      document.getElementById('likeIcon').innerText = '🤍';
      document.getElementById('commentBox').style.display = 'none';
    }

    function closeReelsModal() {
      document.getElementById('reelsModal').style.display = 'none';
      document.body.style.overflow = 'auto'; 
    }

    function toggleLike() {
      const likeIcon = document.getElementById('likeIcon');
      isLiked = !isLiked;
      if(isLiked) {
        likeIcon.innerText = '❤️';
      } else {
        likeIcon.innerText = '🤍';
      }
    }

    function toggleCommentBox() {
      const commentBox = document.getElementById('commentBox');
      if(commentBox.style.display === 'none' || commentBox.style.display === '') {
        commentBox.style.display = 'block';
        document.getElementById('commentInput').focus();
      } else {
        commentBox.style.display = 'none';
      }
    }

    function sendComment() {
      const input = document.getElementById('commentInput');
      if(input.value.trim() !== "") {
        alert("Izoh qoldirildi: " + input.value);
        input.value = "";
        document.getElementById('commentBox').style.display = 'none
