<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minimal Profil</title>
  <style>
    :root { --bg: #000; --text: #fff; --gray: #888; }
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow-x: hidden; }

    /* Profil qismi */
    .profile { padding: 20px; max-width: 500px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 1px solid #333; object-fit: cover; }
    .stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .val { font-weight: 700; display: block; font-size: 16px; }
    .lbl { font-size: 11px; color: var(--gray); text-transform: uppercase; }
    .bio { font-size: 14px; margin-bottom: 20px; line-height: 1.4; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .item { aspect-ratio: 1; background: #111; cursor: pointer; position: relative; }
    .item img { width: 100%; height: 100%; object-fit: cover; }

    /* Reels uslubidagi Viewer */
    .viewer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); display: none; z-index: 9999;
      overflow-y: scroll; scroll-snap-type: y mandatory;
      scroll-behavior: smooth; overscroll-behavior-y: contain;
    }
    .slide {
      width: 100%; height: 100vh; scroll-snap-align: start;
      position: relative; flex: none; display: flex; align-items: center; justify-content: center;
    }
    .slide img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Overlay */
    .overlay { position: absolute; bottom: 80px; left: 20px; }
    .close { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; z-index: 10000; padding: 10px; }
  </style>
</head>
<body>

<div class="profile">
  <div class="header">
    <img src="https://picsum.photos/80/80" class="avatar">
    <div class="stats">
      <div class="stat"><span class="val">3</span><span class="lbl">Post</span></div>
      <div class="stat"><span class="val">1.2K</span><span class="lbl">Obunachi</span></div>
      <div class="stat"><span class="val">348</span><span class="lbl">Obuna</span></div>
    </div>
  </div>
  <div class="bio"><b>Muslimaxon Bekpolatova</b><br>Minimalist lifestyle creator ✨</div>
  <div class="grid" id="grid"></div>
</div>

<div class="viewer" id="viewer">
  <div class="close" onclick="closeV()">✕</div>
  <div id="slides"></div>
</div>

<script>
  const posts = [
    {img: "https://picsum.photos/500/900?1", likes: "1,200", comm: "45"},
    {img: "https://picsum.photos/500/900?2", likes: "950", comm: "20"},
    {img: "https://picsum.photos/500/900?3", likes: "3,100", comm: "120"}
  ];

  const grid = document.getElementById('grid');
  posts.forEach((p, i) => {
    grid.innerHTML += `<div class="item" onclick="openV(${i})"><img src="${p.img}"></div>`;
  });

  function openV(idx) {
    const s = document.getElementById('slides');
    s.innerHTML = '';
    posts.forEach(p => {
      s.innerHTML += `
        <div class="slide">
          <img src="${p.img}">
          <div class="overlay">
            <p style="font-size:18px; font-weight:bold;">♥ ${p.likes}</p>
            <p>💬 ${p.comm} ta izoh</p>
          </div>
        </div>`;
    });
    const v = document.getElementById('viewer');
    v.style.display = 'block';
    v.scrollTop = idx * window.innerHeight; // Tanlangan postga o'tish
  }

  function closeV() { document.getElementById('viewer').style.display = 'none'; }
</script>

</body>
</html>
