<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRWM — Profile Premium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000000;
      color: #ffffff;
      padding-bottom: 80px;
      overflow-x: hidden;
    }

    /* PROFILE HEADER */
    .profile-header {
      padding: 24px 20px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .top-meta {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .profile-avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stats-flex {
      display: flex;
      gap: 20px;
      flex: 1;
    }

    .stat-box {
      text-align: left;
    }

    .stat-num {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* EDIT PROFILE BUTTON */
    .edit-profile-btn {
      width: 100%;
      background: #1c1c1e;
      color: #ffffff;
      border: none;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    .edit-profile-btn:active {
      background: #2c2c2e;
    }

    /* BIO SECTION */
    .profile-bio {
      padding: 0 4px;
    }

    .profile-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }

    .profile-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.4;
    }

    /* PREMIUM MINIMAL ANALYTICS */
    .analytics-section {
      padding: 16px 20px;
      background: #0b0b0b;
      margin: 12px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .analytics-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 12px;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* INSTAGRAM STYLE GRID (3 COLUMNS) */
    .reels-grid-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.4);
      padding: 20px 24px 10px 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 12px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 0 2px;
    }

    .grid-item {
      position: relative;
      width: 100%;
      padding-top: 133%;
      background: #111111;
      cursor: pointer;
    }

    .grid-item img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.2s;
    }
    .grid-item:active img { opacity: 0.7; }

    .video-views {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 9px;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 6px;
      border-radius: 3px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      letter-spacing: 0.3px;
    }

    /* FIXED BOTTOM NAVIGATION BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65px;
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
    }
    .nav-btn { background: none; border: none; color: rgba(255, 255, 255, 0.4); font-size: 24px; cursor: pointer; }
    .nav-btn.active { color: #ffffff; }

    /* INSTAGRAM REELS FULL-SCREEN MODAL */
    .reels-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #000000;
      z-index: 2000;
      display: none;
      flex-direction: column;
    }

    .reels-viewer {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #000000;
      touch-action: none;
    }

    .reels-main-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.4);
      border: none;
      color: white;
      font-size: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      z-index: 2100;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* INSTAGRAM REELS BOTTOM BAR ACTION AREA */
    .reels-bottom-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
      padding: 40px 20px 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 2050;
      pointer-events: none; /* Tugmalar ustini to'sib qo'ymasligi uchun */
    }

    .reels-user-info, .reels-interaction-row, .comment-box {
      pointer-events: auto; /* Elementlarning o'ziga bosish funksiyasini qaytaramiz */
    }

    .reels-user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reels-user-info img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .reels-user-name {
      font-size: 13px;
      font-weight: 600;
    }

    /* LIKE, COMMENT, SHARE BUTTONS UNDER THE VIDEO */
    .reels-interaction-row {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .action-row-btn {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-row-btn span {
      font-size: 13px;
      color: #ffffff;
      font-weight: 500;
    }

    /* COMMENT INPUT FIELD */
    .comment-box {
      width: 100%;
      margin-top: 4px;
    }

    .comment-input-wrapper {
      display: flex;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 10px 16px;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .comment-input-wrapper input {
      flex: 1;
      background: none;
      border: none;
      color: white;
      font-size: 13px;
      outline: none;
    }

    .comment-input-wrapper button {
      background: none;
      border: none;
      color: #00fff0;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }

    /* EDIT PROFILE MODAL */
    .edit-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 3000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .edit-modal-content {
      background: #121212;
      border: 1px solid rgba(255,255,255,0.1);
      width: 100%;
      max-width: 400px;
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .edit-modal-title {
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }

    .edit-input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .edit-input-group label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    .edit-input-group input, .edit-input-group textarea {
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px;
      color: #ffffff;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }

    .edit-input-group textarea {
      resize: none;
      height: 60px;
    }

    .edit-modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .edit-action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .edit-save {
      background: #ffffff;
      color: #000000;
    }

    .edit-cancel {
      background: #2c2c2e;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="profile-header">
    <div class="top-meta">
      <img class="profile-avatar" id="profileAvatarImg" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" alt="Avatar">
      <div class="stats-flex">
        <div class="stat-box">
          <div class="stat-num" id="videoCount">3</div>
          <div class="stat-label">Videolar</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">12.4K</div>
          <div class="stat-label">Obunachilar</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">348</div>
          <div class="stat-label">Obunalar</div>
        </div>
      </div>
    </div>
    
    <div class="profile-bio">
      <div class="profile-name" id="profileNameTxt">monochrome.uz</div>
      <div class="profile-desc" id="profileDescTxt">Premium minimal kiyimlar brendi.<br>O'zbekiston bo'ylab tezkor yetkazib berish.</div>
      <button class="edit-profile-btn" onclick="openEditModal()">Profilni tahrirlash</button>
    </div>
  </div>

  <div class="analytics-section">
    <div class="analytics-title">Sotuvchi statistikasi</div>
    <div class="analytics-grid">
      <div class="stat-box">
        <div class="stat-num" style="color: #00fff0;">48.2K</div>
        <div class="stat-label">Ko'rishlar</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" style="color: #ff3b30;">142</div>
        <div class="stat-label">Sotuvlar</div>
      </div>
    </div>
  </div>

  <div class="reels-grid-title">Yuklangan videolar</div>
  <div class="grid-container" id="reelsGrid">
    </div>

  <div class="reels-modal" id="reelsModal">
    <div class="reels-viewer" id="reelsViewer">
      <button class="modal-close" onclick="closeReelsModal()">✕</button>
      <img class="reels-main-img" id="modalImg" src="" alt="Reels content">
      
      <div class="reels-bottom-overlay">
        <div class="reels-user-info">
          <img id="modalUserAvatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" alt="User">
          <span class="reels-user-name" id="modalUserName">monochrome.uz</span>
        </div>

        <div class="reels-interaction-row">
          <button class="action-row-btn" onclick="toggleLike()">
            <span id="likeIcon">🤍</span> <span id="likeCount">1.2K</span>
          </button>
          <button class="action-row-btn" onclick="toggleCommentBox()">
            💬 <span>42</span>
          </button>
          <button class="action-row-btn" onclick="shareVideo()">
            ✈️ <span>Ulashish</span>
          </button>
        </div>

        <div class="comment-box" id="commentBox">
          <div class="comment-input-wrapper">
            <input type="text" placeholder="Fikr bildiring..." id="commentInput">
            <button onclick="sendComment()">Yuborish</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="edit-modal" id="editModal">
    <div class="edit-modal-content">
      <div class="edit-modal-title">Profilni tahrirlash</div>
      
      <div class="edit-input-group">
        <label>Rasm havolasi (URL)</label>
        <input type="text" id="editAvatarInput">
      </div>

      <div class="edit-input-group">
        <label>Foydalanuvchi nomi / Ism</label>
        <input type="text" id="editNameInput">
      </div>

      <div class="edit-input-group">
        <label>Tarjimai hol (Bio)</label>
        <textarea id="editDescInput"></textarea>
      </div>

      <div class="edit-modal-actions">
        <button class="edit-action-btn edit-cancel" onclick="closeEditModal()">Bekor qilish</button>
        <button class="edit-action-btn edit-save" onclick="saveProfileChanges()">Saqlash</button>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="nav-btn" onclick="location.href='home.html'">🏠</button>
    <button class="nav-btn" onclick="location.href='reels.html'">🎬</button>
    <button class="nav-btn" onclick="location.href='upload.html'">➕</button>
    <button class="nav-btn" onclick="location.href='chat.html'">💬</button>
    <button class="nav-btn active" onclick="location.href='profile.html'">👤</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    let currentReelsData = [
      { thumbnail_url: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600', views: '18.2K' },
      { thumbnail_url: 'https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=600', views: '12.1K' },
      { thumbnail_url: 'https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=600', views: '17.9K' }
    ];
    let activeReelsIndex = 0;

    const SUPABASE_URL = 'https://wdoytdiugkhlniysdfri.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_qZHLHaUhp3dqBrj58ZtZWw_61gzjskd';
    let supabaseClient = null;

    try {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch(e) {
      console.log("Supabase kutubxonasi yuklanmagan.");
    }

    function renderGridItems() {
      const gridContainer = document.getElementById('reelsGrid');
      gridContainer.innerHTML = ''; 

      currentReelsData.forEach((post, index) => {
        const gridItem = `
          <div class="grid-item" onclick="openReelsModalAtIndex(${index})">
            <img src="${post.thumbnail_url}" alt="Reels">
            <div class="video-views">▶ ${post.views}</div>
          </div>
        `;
        gridContainer.insertAdjacentHTML('beforeend', gridItem);
      });
      document.getElementById('videoCount').innerText = currentReelsData.length;
    }

    async function loadUserReels() {
      if (!supabaseClient) {
        renderGridItems();
        return;
      }
      try {
        const { data, error } = await supabaseClient.from('reels_posts').select('*');
        if (error) throw error;

        if (data && data.length > 0) {
          currentReelsData = data.map(post => ({
            thumbnail_url: post.thumbnail_url || 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=300',
            views: post.views || '0'
          }));
        }
      } catch(e) {
        console.log("Ma'lumot mahalliy yuklandi.");
      } finally {
        renderGridItems();
      }
    }
    document.addEventListener('DOMContentLoaded', loadUserReels);

    /* MODAL REELS BOSHQARUVI */
    let isLiked = false;
    let touchStartX = 0;
    let touchStartY = 0;

    function openReelsModalAtIndex(index) {
      activeReelsIndex = index;
      renderActiveReel();
      document.getElementById('reelsModal').style.display = 'flex';
      document.body.style.overflow = 'hidden'; 
    }

    function renderActiveReel() {
      const currentReel = currentReelsData[activeReelsIndex];
      if (!currentReel) return;

      document.getElementById('modalUserAvatar').src = document.getElementById('profileAvatarImg').src;
      document.getElementById('modalUserName').innerText = document.getElementById('profileNameTxt').innerText;
      document.getElementById('modalImg').src = currentReel.thumbnail_url;
      
      isLiked = false;
      document.getElementById('likeIcon').innerText = '🤍';
      document.getElementById('commentBox').style.display = 'none';
      document.getElementById('commentInput').value = '';
    }

    function nextReel() {
      if (activeReelsIndex < currentReelsData.length - 1) {
        activeReelsIndex++;
        renderActiveReel();
      }
    }

    function prevReel() {
      if (activeReelsIndex > 0) {
        activeReelsIndex--;
        renderActiveReel();
      }
    }

    // Kuchaytirilgan Touch/Swipe tizimi
    const viewer = document.getElementById('reelsViewer');
    
    viewer.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    viewer.addEventListener('touchmove', (e) => {
      // Modal ichida sahifa scroll bo'lib ketishini to'liq bloklaymiz
      e.preventDefault();
    }, { passive: false });

    viewer.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].screenX;
      const touchEndY = e.changedTouches[0].screenY;
      
      const diffX = touchStartX - touchEndX;
      const diffY = touchStartY - touchEndY;

      // Faqat vertikal surish aniq bo'lgandagina videoni o'zgartiradi (X o'qi hisoblanmaydi)
      if (Math.abs(diffY) > Math.abs(diffX)) {
        if (diffY > 70) {
          nextReel(); // Tepaga surildi
        } else if (diffY < -70) {
          prevReel(); // Pastga surildi
        }
      }
    }, { passive: true });

    // Kompyuter uchun sichqoncha g'ildiragi
    viewer.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.deltaY > 0) {
        nextReel();
      } else if (e.deltaY < 0) {
        prevReel();
      }
    }, { passive: false });

    function closeReelsModal() {
      document.getElementById('reelsModal').style.display = 'none';
      document.body.style.overflow = 'auto'; 
    }

    function toggleLike() {
      const likeIcon = document.getElementById('likeIcon');
      isLiked = !isLiked;
      likeIcon.innerText = isLiked ? '❤️' : '🤍';
    }

    function toggleCommentBox() {
      const commentBox = document.getElementById('commentBox');
      if(commentBox.style.display === 'none' || commentBox.style.display === '') {
        commentBox.style.display = 'block';
        document.getElementById('commentInput').focus();
      } else {
        commentBox.style.display = 'none';
      }
    }

    function sendComment() {
      const input = document.getElementById('commentInput');
      if(input.value.trim() !== "") {
        alert("Izoh qoldirildi: " + input.value);
        input.value = "";
        document.getElementById('commentBox').style.display = 'none';
      }
    }

    document.getElementById('commentInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendComment();
      }
    });

    function shareVideo() {
      alert("Havola nusxalandi! Do'stlaringizga jo'natishingiz mumkin.");
    }

    /* PROFILNI TAHRIRLASH */
    function openEditModal() {
      document.getElementById('editAvatarInput').value = document.getElementById('profileAvatarImg').src;
      document.getElementById('editNameInput').value = document.getElementById('profileNameTxt').innerText;
      
      const rawDesc = document.getElementById('profileDescTxt').innerHTML;
      document.getElementById('editDescInput').value = rawDesc.replace(/<br\s*\/?>/g, "\n");
      
      document.getElementById('editModal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    function saveProfileChanges() {
      const newAvatar = document.getElementById('editAvatarInput').
