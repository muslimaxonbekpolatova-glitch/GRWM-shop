<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRWM — Create Premium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000000;
      color: #ffffff;
      padding-bottom: 80px;
      overflow-x: hidden;
      height: 100vh;
    }

    /* HEADER */
    .upload-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .upload-header h1 {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-btn {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .header-btn:disabled { color: rgba(255,255,255,0.2); cursor: not-allowed; }

    /* STEP FLOW MANAGEMENT */
    .step-container { display: none; width: 100%; height: calc(100vh - 125px); overflow-y: auto; }
    .step-container.active { display: block; }

    /* STEP 1: MEDIA SELECT */
    .media-pick-zone {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .drop-zone {
      width: 100%;
      max-width: 340px;
      height: 420px;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #050505;
      position: relative;
      overflow: hidden;
    }

    /* REAL-TIME PREVIEW WINDOW */
    .preview-window {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 5;
      transition: filter 0.3s ease; /* Effektlar uchun silliq o'tish */
    }

    /* STEP 2: MUSIC & EFFECTS */
    .edit-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 20px;
    }

    .mini-preview-box {
      width: 100%;
      max-width: 260px;
      height: 340px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: #090909;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .tool-section {
      width: 100%;
      max-width: 340px;
    }

    .tool-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 10px;
      padding-left: 4px;
    }

    /* Horizontal scrollable selectors */
    .scroll-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 10px;
    }
    .scroll-row::-webkit-scrollbar { display: none; }

    .selector-item {
      flex: 0 0 auto;
      padding: 10px 18px;
      background: #111111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      color: #ffffff;
      font-size: 12px;
      cursor: pointer;
    }
    .selector-item.selected {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }

    /* STEP 3: METADATA & INFO */
    .form-container {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-width: 360px;
      margin: 0 auto;
    }

    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); }
    
    .minimal-input {
      background: #111111;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px;
      color: #ffffff;
      font-size: 13px;
      border-radius: 8px;
      outline: none;
      width: 100%;
    }
    .minimal-input:focus { border-color: rgba(255,255,255,0.2); }

    .publish-btn {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 16px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 12px;
    }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65px;
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
    }
    .nav-btn { background: none; border: none; color: rgba(255, 255, 255, 0.4); font-size: 24px; cursor: pointer; }
    .nav-btn.active { color: #ffffff; }

    /* EFFECT FILTERS DIRECT IN CSS */
    .fx-normal { filter: none; }
    .fx-vintage { filter: sepia(0.5) contrast(1.1) brightness(0.9); }
    .fx-mono { filter: grayscale(1) contrast(1.2); }
    .fx-cyber { filter: hue-rotate(90deg) saturate(1.3); }
    .fx-warm { filter: saturate(1.1) sepia(0.15) brightness(1.05); }
  </style>
</head>
<body>

  <!-- DINAMIK ALMASHINUVCHI HEADER -->
  <div class="upload-header">
    <button class="header-btn" id="backHeaderBtn" onclick="goBackStep()" style="visibility: hidden;">Orqaga</button>
    <h1 id="headerTitle">Yuklash</h1>
    <button class="header-btn" id="nextHeaderBtn" disabled onclick="goNextStep()">Keyingi</button>
  </div>

  <!-- BOSQICH 1: MULTIMEDIA TANLASH -->
  <div class="step-container active" id="step1">
    <div class="media-pick-zone">
      <div class="drop-zone" onclick="document.getElementById('fileSource').click()">
        <div id="uploadPrompt" style="text-align: center; padding: 20px;">
          <span style="font-size: 36px; display: block; margin-bottom: 10px;">🎬</span>
          <span style="font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px;">Video yoki rasm tanlang</span>
        </div>
        <input type="file" id="fileSource" accept="video/*,image/*" style="display: none;" onchange="loadMediaToApp(event)">
        <div id="previewWrapper1"></div>
      </div>
    </div>
  </div>

  <!-- BOSQICH 2: MUSIQA VA EFFEKTLER (INSTAGRAM DEK) -->
  <div class="step-container" id="step2">
    <div class="edit-layout">
      <!-- Ko'rinish oynasi -->
      <div class="mini-preview-box" id="previewWrapper2"></div>

      <!-- Musiqalar ro'yxati -->
      <div class="tool-section">
        <div class="tool-title">🎵 Musiqa tanlash</div>
        <div class="scroll-row" id="musicRow">
          <div class="selector-item selected" onclick="selectMusic(this, 'Hech qanday')">Asl ovoz</div>
          <div class="selector-item" onclick="selectMusic(this, 'Low-Fi Minimal')">Low-Fi Minimal</div>
          <div class="selector-item" onclick="selectMusic(this, 'Phonk Beats')">Phonk Beats</div>
          <div class="selector-item" onclick="selectMusic(this, 'Tech Deep')">Tech Deep</div>
        </div>
      </div>

      <!-- Effektlar (Filtrlar) ro'yxati -->
      <div class="tool-section">
        <div class="tool-title">✨ Effektlar</div>
        <div class="scroll-row">
          <div class="selector-item selected" onclick="applyEffect('normal', this)">Original</div>
          <div class="selector-item" onclick="applyEffect('vintage', this)">Vintage</div>
          <div class="selector-item" onclick="applyEffect('mono', this)">Noir (B&W)</div>
          <div class="selector-item" onclick="applyEffect('cyber', this)">Neon Cyber</div>
          <div class="selector-item" onclick="applyEffect('warm', this)">Warm Aesthetic</div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOSQICH 3: BIO VA TAFSILOTLAR -->
  <div class="step-container" id="step3">
    <div class="form-container">
      <div class="input-group">
        <label class="input-label">Mahsulot nomi</label>
        <input type="text" class="minimal-input" placeholder="Masalan: Premium Minimal Hoodie">
      </div>
      <div class="input-group">
        <label class="input-label">Narxi va ma'lumotlar</label>
        <input type="text" class="minimal-input" placeholder="389,000 so'm / Grafit rang">
      </div>
      <div class="input-group">
        <label class="input-label">Tavsif (Bio)</label>
        <input type="text" class="minimal-input" placeholder="Kuzgi oversize yangi kolleksiya...">
      </div>
      <button class="publish-btn" onclick="finalizeAndPost()">E'lon qilish</button>
    </div>
  </div>

  <!-- INSTAGRAM BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="nav-btn" onclick="location.href='home.html'">🏠</button>
    <button class="nav-btn" onclick="location.href='reels.html'">🎬</button>
    <button class="nav-btn active" onclick="location.href='upload.html'">➕</button>
    <button class="nav-btn" onclick="location.href='chat.html'">💬</button>
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
  </div>

  <script>
    let currentStep = 1;
    let selectedFileUrl = null;
    let selectedFileType = null;
    let activeEffectClass = 'fx-normal';
    let activeMusicName = 'Asl ovoz';

    function loadMediaToApp(event) {
      const file = event.target.files[0];
      if (!file) return;

      selectedFileUrl = URL.createObjectURL(file);
      selectedFileType = file.type;

      // Bosqich 1 uchun preview generatsiyasi
      renderPreview(document.getElementById('previewWrapper1'));
      document.getElementById('uploadPrompt').style.display = 'none';
      
      // "Keyingi" tugmasini aktivlashtirish
      document.getElementById('nextHeaderBtn').disabled = false;
    }

    function renderPreview(targetElement) {
      targetElement.innerHTML = '';
      if (selectedFileType.startsWith('video/')) {
        const video = document.createElement('video');
        video.className = `preview-window ${activeEffectClass}`;
        video.src = selectedFileUrl;
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        targetElement.appendChild(video);
      } else {
        const img = document.createElement('img');
        img.className = `preview-window ${activeEffectClass}`;
        img.src = selectedFileUrl;
        targetElement.appendChild(img);
      }
    }

    /* STEP LOGIKALARI */
    function goNextStep() {
      if (currentStep === 1) {
        currentStep = 2;
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('backHeaderBtn').style.visibility = 'visible';
        document.getElementById('headerTitle').textContent = 'Tahrirlash';
        renderPreview(document.getElementById('previewWrapper2'));
      } else if (currentStep === 2) {
        currentStep = 3;
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step3').classList.add('active');
        document.getElementById('headerTitle').textContent = 'Tavsif';
        document.getElementById('nextHeaderBtn').style.visibility = 'hidden';
      }
    }

    function goBackStep() {
      if (currentStep === 2) {
        currentStep = 1;
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
        document.getElementById('backHeaderBtn').style.visibility = 'hidden';
        document.getElementById('headerTitle').textContent = 'Yuklash';
        renderPreview(document.getElementById('previewWrapper1'));
      } else if (currentStep === 3) {
        currentStep = 2;
        document.getElementById('step3').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('headerTitle').textContent = 'Tahrirlash';
        document.getElementById('nextHeaderBtn').style.visibility = 'visible';
        renderPreview(document.getElementById('previewWrapper2'));
      }
    }

    /* EFFEKTNI VIDEOGA QO'LLASH (LIVE DYNAMICS) */
    function applyEffect(fxName, element) {
      // Aktiv klassni o'zgartirish
      activeEffectClass = `fx-${fxName}`;
      
      // Tugma vizualini yangilash
      const row = element.parentElement;
      row.querySelectorAll('.selector-item').forEach(item => item.classList.remove('selected'));
      element.classList.add('selected');

      // Preview oynasidagi element filtrini darhol yangilash
      const view = document.getElementById('previewWrapper2').querySelector('.preview-window');
      if (view) {
        view.className = `preview-window ${activeEffectClass}`;
      }
    }

    function selectMusic(element, trackName) {
      activeMusicName = trackName;
      const row = document.getElementById('musicRow');
      row.querySelectorAll('.selector-item').forEach(item => item.classList.remove('selected'));
      element.classList.add('selected');
    }

    function finalizeAndPost() {
      alert(`Muvaffaqiyatli chop etildi!\nEffekt: ${activeEffectClass.replace('fx-', '')}\nMusiqa: ${activeMusicName}`);
      location.href = 'profile.html';
    }
  </script>
</body>
</html>
