<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRWM — Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000000;
      color: #ffffff;
      padding-bottom: 75px;
      overflow-x: hidden;
    }

    /* PREMIUM TOP NAVIGATION */
    .header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 200;
    }

    .brand-logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .noti-trigger {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 22px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .noti-trigger:active { opacity: 0.5; }

    /* INSTAGRAM USLUBIDAGI TEPADAN TUSHUVCHI BILDIRISHNOMA OYNASI */
    .noti-dropdown {
      position: fixed;
      top: 75px;
      right: 20px;
      width: calc(100% - 40px);
      max-width: 340px;
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      display: none;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      z-index: 300;
    }

    .noti-dropdown.active {
      display: block;
      animation: fadeIn 0.2s ease-out;
    }

    .noti-header {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }

    .noti-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .noti-item:last-child { border: none; }

    .user-flex {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      background: #222;
    }

    .noti-text {
      font-size: 12px;
      line-height: 1.4;
      color: rgba(255,255,255,0.8);
    }
    .noti-text span { font-weight: 600; color: #fff; }

    .post-mini {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border-radius: 4px;
    }

    /* PREMIUM AD PLATFORM (SLIDER) */
    .premium-wrapper {
      padding: 10px 20px 20px 20px;
    }

    .premium-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 16px;
    }

    .premium-slider {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
    }
    .premium-slider::-webkit-scrollbar { display: none; }

    .premium-card {
      flex: 0 0 100%;
      scroll-snap-align: start;
      height: 380px;
      background: #111111;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
    }

    .premium-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .premium-meta {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
    }

    .badge {
      font-size: 9px;
      background: #ffffff;
      color: #000000;
      padding: 3px 8px;
      font-weight: 700;
      text-transform: uppercase;
      display: inline-block;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .ad-title {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* FIXED BOTTOM NAVIGATION (MINIMAL INSTAGRAM) */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65px;
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
    }

    .nav-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-btn.active {
      color: #ffffff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="brand-logo">GRWM</div>
    <!-- O'ng tomonda faqat bitta toza yurakcha tugmasi (Bildirishnomalar uchun) -->
    <button class="noti-trigger" onclick="toggleNotifications()">❤️</button>
  </div>

  <!-- INSTAGRAM STYLE DROPDOWN (TEPADAN TUSHADIGAN BILDIRISHNOMA) -->
  <div class="noti-dropdown" id="notiDropdown">
    <div class="noti-header">
      <span>Bildirishnomalar</span>
      <span style="cursor:pointer; color:#fff;" onclick="toggleNotifications()">✕</span>
    </div>
    <div id="notiList">
      <!-- Like va Commentlar shu yerga yig'iladi -->
    </div>
  </div>

  <!-- MAIN PREMIUM DISPLAY -->
  <div class="premium-wrapper">
    <div class="premium-label">Premium Tavsiyalar</div>
    <div class="premium-slider" id="premiumSlider">
      <div class="premium-card">
        <div class="premium-meta">
          <span class="badge">Yuklanmoqda</span>
        </div>
      </div>
    </div>
  </div>

  <!-- NAVIGATION -->
  <div class="bottom-bar">
    <button class="nav-btn active" onclick="location.href='home.html'">🏠</button>
    <button class="nav-btn" onclick="location.href='reels.html'">🎬</button>
    <button class="nav-btn" onclick="location.href='upload.html'">➕</button>
    <button class="nav-btn" onclick="location.href='chat.html'">💬</button>
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://wdoytdiugkhlniysdfri.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_qZHLHaUhp3dqBrj58ZtZWw_61gzjskd';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. BILDIRISHNOMANI OCHIB-YOPISH
    function toggleNotifications() {
      document.getElementById('notiDropdown').classList.toggle('active');
    }

    // 2. PREMIUM ADS YUKLASH
    async function loadAds() {
      try {
        const { data, error } = await supabase
          .from('premium_ads')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;
        const slider = document.getElementById('premiumSlider');
        slider.innerHTML = '';

        if (data && data.length > 0) {
          data.forEach(ad => {
            slider.innerHTML += `
              <div class="premium-card">
                <img src="${ad.image_url}">
                <div class="premium-meta">
                  <span class="badge">Premium</span>
                  <div class="ad-title">${ad.title}</div>
                </div>
              </div>
            `;
          });
        } else {
          // Baza bo'sh bo'lsa minimalist demo reklama
          slider.innerHTML = `
            <div class="premium-card">
              <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600">
              <div class="premium-meta">
                <span class="badge">Kolleksiya</span>
                <div class="ad-title">Minimalist kuzgi kiyimlar to'plami</div>
              </div>
            </div>
          `;
        }
      } catch (e) {
        console.error(e);
      }
    }

    // 3. LIKELAR VA COMMENTLARNI TEPADAGI PANELGA YUKLASH
    async function loadNotifications() {
      const notiList = document.getElementById('notiList');
      try {
        const { data, error } = await supabase
          .from('activity_logs')
          .select('*, profiles(username, avatar_url)')
          .limit(5);

        if (error) throw error;
        notiList.innerHTML = '';

        if(data && data.length > 0) {
          data.forEach(act => {
            const isLike = act.type === 'like';
            notiList.innerHTML += `
              <div class="noti-item">
                <div class="user-flex">
                  <img class="user-avatar" src="${act.profiles.avatar_url}">
                  <div class="noti-text">
                    <span>${act.profiles.username}</span> ${isLike ? 'videongizga like bosdi.' : 'izoh qoldirdi: "' + act.text + '"'}
                  </div>
                </div>
                <img class="post-mini" src="${act.post_img}">
              </div>
            `;
          });
        } else {
          showDemoNotifications();
        }
      } catch (e) {
        showDemoNotifications();
      }
    }

    // Demo bildirishnomalar (Instagram formatida)
    function showDemoNotifications() {
      const notiList = document.getElementById('notiList');
      const demos = [
        { username: 'madina_style', action: 'videongizga like bosdi.', img: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80', post: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=80' },
        { username: 'grwm_uz', action: 'izoh qoldirdi: "Koftani o‘lchami bormi?"', img: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80', post: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=80' }
      ];
      notiList.innerHTML = '';
      demos.forEach(d => {
        notiList.innerHTML += `
          <div class="noti-item">
            <div class="user-flex">
              <img class="user-avatar" src="${d.img}">
              <div class="noti-text"><span>${d.username}</span> ${d.action}</div>
            </div>
            <img class="post-mini" src="${d.post}">
          </div>
        `;
      });
    }

    // Yuklash
    loadAds();
    loadNotifications();
  </script>
</body>
  </html>
