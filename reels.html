<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRWM — Reels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
    
    .reels-container { height: calc(100vh - 65px); scroll-snap-type: y mandatory; overflow-y: scroll; width: 100%; }
    .reel-video-box { width: 100%; height: calc(100vh - 65px); scroll-snap-align: start; position: relative; background: #050505; display: flex; align-items: center; justify-content: center; }
    
    .mock-video { width: 100%; height: 100%; object-fit: cover; background: linear-gradient(180deg, #111, #222); display: flex; align-items: center; justify-content: center; font-size: 14px; color: rgba(255,255,255,0.4); }

    /* OVERLAY ACTION BUTTONS */
    .right-controls { position: absolute; right: 16px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 10; align-items: center; }
    .action-icn-btn { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-weight: normal; }
    .action-icn-btn span { font-size: 11px; margin-top: 4px; color: rgba(255,255,255,0.7); }
    .action-icn-btn.liked { color: #ff3b30; font-weight: bold; } /* Layk bosilgandagi rang */

    .bottom-info { position: absolute; left: 16px; bottom: 30px; z-index: 10; max-width: 70%; }
    .product-tag { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; border: none; color: #fff; cursor: pointer; margin-top: 8px; }

    /* UZUM STYLE MULTI-STEP BUY PANEL */
    .buy-panel {
      position: fixed; bottom: 0; left: 0; width: 100%; background: #0b0b0b;
      border-top: 1px solid rgba(255,255,255,0.1); border-radius: 20px 20px 0 0;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0, 0, 0.2, 1); z-index: 2000; padding: 24px 20px;
    }
    .buy-panel.open { transform: translateY(0); }
    .panel-step { display: none; flex-direction: column; gap: 16px; }
    .panel-step.active { display: flex; }
    .p-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.5); }
    
    .grid-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
    .opt-chip { padding: 12px 20px; background: #161616; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; font-size: 13px; cursor: pointer; }
    .opt-chip.selected { background: #fff; color: #000; border-color: #fff; font-weight: 600; }
    
    .panel-next-btn { background: #fff; color: #000; border: none; width: 100%; padding: 16px; font-size: 12px; font-weight: 700; text-transform: uppercase; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    .confirm-row { display: flex; gap: 12px; margin-top: 10px; }
    .c-btn { flex: 1; padding: 16px; border: none; font-size: 12px; font-weight: 700; text-transform: uppercase; border-radius: 8px; cursor: pointer; }
    .c-btn.yes { background: #fff; color: #000; }
    .c-btn.no { background: #161616; color: #fff; }

    /* BOTTOM BAR */
    .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    .nav-btn { background: none; border: none; color: rgba(255, 255, 255, 0.4); font-size: 24px; cursor: pointer; }
    .nav-btn.active { color: #ffffff; }
  </style>
</head>
<body>

  <div class="reels-container">
    <!-- REEL POST 1 -->
    <div class="reel-video-box">
      <div class="mock-video">🎬 [Reels Video Space - Swipe Up]</div>
      
      <div class="right-controls">
        <!-- LAYK TUGMASI (Bosganda almashadi) -->
        <button class="action-icn-btn" onclick="toggleLike(this)">🤍 <span>1.2k</span></button>
        <button class="action-icn-btn" onclick="location.href='chat.html'">💬 <span>42</span></button>
      </div>

      <div class="bottom-info">
        <h3>@grwm_premium</h3>
        <p>Oversize Minimalist Trench Coat</p>
        <button class="product-tag" onclick="openBuyFlow()">🛍 Sotib olish — 450,000 so'm</button>
      </div>
    </div>
  </div>

  <!-- UZUM STYLE MULTI-STEP PANEL -->
  <div class="buy-panel" id="uzumPanel">
    
    <!-- STEP 1: SIZE -->
    <div class="panel-step active" id="pStep1">
      <div class="p-title">O'lchamni tanlang (Size)</div>
      <div class="grid-options">
        <div class="opt-chip" onclick="selectChip(this)">S</div>
        <div class="opt-chip selected" onclick="selectChip(this)">M</div>
        <div class="opt-chip" onclick="selectChip(this)">L</div>
        <div class="opt-chip" onclick="selectChip(this)">XL</div>
      </div>
      <button class="panel-next-btn" onclick="nextBuyStep(2)">Keyingi</button>
    </div>

    <!-- STEP 2: COLOR -->
    <div class="panel-step" id="pStep2">
      <div class="p-title">Rangni tanlang (Color)</div>
      <div class="grid-options">
        <div class="opt-chip selected" onclick="selectChip(this)">Matt Black</div>
        <div class="opt-chip" onclick="selectChip(this)">Graphite Grey</div>
        <div class="opt-chip" onclick="selectChip(this)">Sand Beige</div>
      </div>
      <button class="panel-next-btn" onclick="nextBuyStep(3)">Keyingi</button>
    </div>

    <!-- STEP 3: CONFIRMATION -->
    <div class="panel-step" id="pStep3">
      <div class="p-title" style="text-align: center; margin-bottom: 5px;">Haqiqatan ham sotib olasizmi?</div>
      <div class="confirm-row">
        <button class="c-btn yes" onclick="confirmPurchase(true)">Ha</button>
        <button class="c-btn no" onclick="confirmPurchase(false)">Yo'q</button>
      </div>
    </div>

  </div>

  <!-- FIXED BOTTOM NAVIGATION BAR -->
  <div class="bottom-bar">
    <button class="nav-btn" onclick="location.href='home.html'">🏠</button>
    <button class="nav-btn active" onclick="location.href='reels.html'">🎬</button>
    <button class="nav-btn" onclick="location.href='upload.html'">➕</button>
    <button class="nav-btn" onclick="location.href='chat.html'">💬</button>
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
  </div>

  <script>
    // LAYK FUNKSIYASI
    function toggleLike(btn) {
      btn.classList.toggle('liked');
      if(btn.classList.contains('liked')) {
        btn.innerHTML = "❤️ <span>1,201</span>";
      } else {
        btn.innerHTML = "🤍 <span>1,200</span>";
      }
    }

    // XARID PANELINI OCHISH
    function openBuyFlow() {
      document.getElementById('uzumPanel').classList.add('open');
      nextBuyStep(1); // Birinchi stepdan boshlash
    }

    function selectChip(element) {
      const parent = element.parentElement;
      parent.querySelectorAll('.opt-chip').forEach(c => c.classList.remove('selected'));
      element.classList.add('selected');
    }

    function nextBuyStep(stepNum) {
      document.querySelectorAll('.panel-step').forEach(s => s.classList.remove('active'));
      document.getElementById(`pStep${stepNum}`).classList.add('active');
    }

    function confirmPurchase(isYes) {
      const panel = document.getElementById('uzumPanel');
      panel.classList.remove('open'); // Panelni yopish

      if(isYes) {
        alert("Buyurtmangiz qabul qilindi! Xaridingiz haqida Chat bo'limiga xabar yuborildi.");
      }
      // "Yo'q" bosilganda hech qanday xabarsiz to'g'ridan-to'g'ri videoga qaytadi
    }
  </script>
</body>
</html>
